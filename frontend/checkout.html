<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2d6f65" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="favicon.ico" sizes="32x32" />
    <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icons/icon-180.png" />
    <title>Checkout | GardenMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer data-domain="gardenmarket.local" src="https://plausible.io/js/script.js"></script>
    <script defer src="app.js"></script>
    <script defer src="checkout.js"></script>
  </head>
  <body data-page="checkout">
    <header class="site-header">
      <div class="logo" role="banner">GardenMarket</div>
      <nav class="nav-links" aria-label="Main navigation"></nav>
    </header>

    <main class="split">
      <section class="panel">
        <h1>Checkout</h1>
        <p>Select a distribution center and pickup details to place your order.</p>
        <form id="checkout-form" class="stack" aria-label="Checkout form">
          <label>
            Distribution center
            <select id="center-select" name="distribution_center" required>
              <option value="">Loading centers...</option>
            </select>
          </label>
          <label>
            Pickup date
            <input type="date" name="pickup_date" required />
          </label>
          <label>
            Pickup window
            <select id="window-select" name="pickup_window" required>
              <option value="">Select a center first</option>
            </select>
          </label>
          <button class="button primary" type="submit">Place order</button>
          <p id="checkout-message" class="message"></p>
        </form>
      </section>

      <section class="panel muted">
        <h2>Cart Summary</h2>
        <div id="checkout-cart-summary"><p>Loading...</p></div>
      </section>
    </main>

    <footer class="site-footer">
      <span>GardenMarket 2026</span>
      <nav class="footer-links" aria-label="Legal links">
        <a href="terms.html">Terms</a>
        <a href="privacy.html">Privacy</a>
        <a href="seller-agreement.html">Seller Agreement</a>
      </nav>
    </footer>
  </body>
</html>
