<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#2d6f65" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="GardenMarket" />
    <meta name="description" content="GardenMarket is offline. We'll be back as soon as you reconnect." />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>Offline | GardenMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page="offline">
    <header class="site-header">
      <div class="logo">GardenMarket</div>
      <nav class="nav-links" aria-label="Primary">
        <a href="/index.html">Home</a>
      </nav>
    </header>

    <main class="panel" style="margin: 8vh 8vw; text-align: center;" role="main">
      <h1>You're offline</h1>
      <p class="lead">
        We can't reach the market right now. Check your connection and we'll
        bring you back to fresh harvests in a moment.
      </p>
      <div class="cta-row" style="justify-content: center;">
        <button class="button primary" type="button" onclick="window.location.reload()">
          Try again
        </button>
        <a class="button ghost" href="/index.html">Go home</a>
      </div>
      <p class="muted" style="margin-top: 2rem;">
        Pages you've already visited may still be available from cache.
      </p>
    </main>

    <footer class="site-footer">
      <span>GardenMarket 2026</span>
    </footer>
  </body>
</html>
