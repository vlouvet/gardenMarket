<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Profile | GardenMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer data-domain="gardenmarket.local" src="https://plausible.io/js/script.js"></script>
    <script defer src="app.js"></script>
    <script defer src="profile.js"></script>
  </head>
  <body data-page="profile">
    <header class="site-header">
      <div class="logo">GardenMarket</div>
      <nav class="nav-links"></nav>
    </header>

    <main class="split">
      <section class="panel">
        <h1>Your Profile</h1>
        <p>Update your address so we can show nearby listings and centers.</p>
        <form id="profile-form" class="stack">
          <label>Address line 1 <input type="text" name="address_line1" /></label>
          <label>Address line 2 <input type="text" name="address_line2" /></label>
          <label>City <input type="text" name="city" /></label>
          <label>State <input type="text" name="state" /></label>
          <label>Postal code <input type="text" name="postal_code" /></label>
          <label>Country <input type="text" name="country" /></label>
          <button class="button primary" type="submit">Save profile</button>
          <p id="profile-message" class="message"></p>
        </form>
      </section>

      <section class="panel muted">
        <h2>Account</h2>
        <p>Email: <strong id="account-email">--</strong></p>
        <p>Role: <strong id="account-role">--</strong></p>
        <button class="button ghost" id="logout-button">Sign out</button>
      </section>
    </main>

    <footer class="site-footer">
      <span>GardenMarket 2026</span>
      <div class="footer-links">
        <a href="terms.html">Terms</a>
        <a href="privacy.html">Privacy</a>
        <a href="seller-agreement.html">Seller Agreement</a>
      </div>
    </footer>
  </body>
</html>
