<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Cart | GardenMarket</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,800&family=Space+Grotesk:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <script defer data-domain="gardenmarket.local" src="https://plausible.io/js/script.js"></script>
    <script defer src="app.js"></script>
    <script defer src="cart.js"></script>
  </head>
  <body data-page="cart">
    <header class="site-header">
      <div class="logo">GardenMarket</div>
      <nav class="nav-links"></nav>
    </header>

    <main class="page-content">
      <div class="page-header">
        <h1>Your Cart</h1>
      </div>
      <div id="cart-items"></div>
      <div id="cart-footer" class="cart-footer" style="display:none">
        <p><strong>Total: <span id="cart-total">$0.00</span></strong></p>
        <a class="button primary" href="checkout.html">Proceed to checkout</a>
      </div>
    </main>

    <footer class="site-footer">
      <span>GardenMarket 2026</span>
      <div class="footer-links">
        <a href="terms.html">Terms</a>
        <a href="privacy.html">Privacy</a>
        <a href="seller-agreement.html">Seller Agreement</a>
      </div>
    </footer>
  </body>
</html>
