services:
  web:
    image: gardenmarket-app
    build:
      context: .
      dockerfile: docker/Dockerfile
    env_file:
      - .env
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 10s
      timeout: 5s
      retries: 5
    extra_hosts:
      - "host.docker.internal:host-gateway"

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: garden
      POSTGRES_PASSWORD: garden
      POSTGRES_DB: garden
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U garden -d garden"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9002"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - "9000:9000"
      - "9002:9002"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  worker:
    image: gardenmarket-app
    env_file:
      - .env
    command: celery -A config.celery_app worker -l info
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    image: gardenmarket-frontend
    ports:
      - "8881:80"
    depends_on:
      web:
        condition: service_healthy

  frontend-dev:
    profiles: ["frontend-dev"]
    image: node:22-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "if [ -f package-lock.json ]; then npm ci; else npm install; fi && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      web:
        condition: service_healthy

  frontend-tests:
    profiles: ["tests"]
    image: mcr.microsoft.com/playwright:v1.48.0-jammy
    working_dir: /app
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "if [ -f package-lock.json ]; then npm ci; else npm install; fi && npx playwright test"
    depends_on:
      nginx:
        condition: service_healthy

  beat:
    image: gardenmarket-app
    env_file:
      - .env
    command: celery -A config.celery_app beat -l info
    volumes:
      - ./backend:/app
    depends_on:
      redis:
        condition: service_healthy

volumes:
  pgdata:
  minio_data:
  frontend_node_modules:
